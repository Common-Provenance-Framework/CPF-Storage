replicaCount: 1

image:
  repository: cpf-store
  tag: latest # TODO: Setup Dockerhub
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

resources: {}

nodeSelector: {}
tolerations: []
affinity: {}

springProfilesActive: prod

config:
  NEO4J_URI: bolt://neo4j:7687
  STORE_URL: http://localhost:8080/api/v1/
  TRUSTED_PARTY_URL: http://trustedparty:8080/api/v1/
  CPF_STORE_VERBOSE_MODE: "false"

existingSecret:
  name: neo4j
  keys:
    NEO4J_USERNAME: neo4j-username
    NEO4J_PASSWORD: neo4j-password

extraEnv: []

# TODO Introduce Actuator and Set liveness probes
livenessProbe: {}
readinessProbe: {}
startupProbe: {}
